<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Image Gallery</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <!-- Header -->
    <header>

        <h1>
            <i class="fa-regular fa-images"></i>
            Professional Image Gallery
        </h1>

        <p>Beautiful Responsive Gallery with Filters & Lightbox</p>

    </header>



    <!-- Filter Buttons -->

    <section class="filters">

        <button class="filter-btn active" data-filter="all">All</button>

        <button class="filter-btn" data-filter="nature">Nature</button>

        <button class="filter-btn" data-filter="city">City</button>

        <button class="filter-btn" data-filter="animals">Animals</button>

    </section>



    <!-- Gallery -->

    <section class="gallery">


        <!-- Image 1 -->

        <div class="gallery-item nature">

            <img src="images/img1.jpg" alt="Nature">

            <div class="overlay">
                <h3>Mountain View</h3>
                <button class="view-btn">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    View
                </button>
            </div>

        </div>



        <!-- Image 2 -->

        <div class="gallery-item city">

            <img src="images/img2.jpg" alt="City">

            <div class="overlay">
                <h3>City Lights</h3>
                <button class="view-btn">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    View
                </button>
            </div>

        </div>



        <!-- Image 3 -->

        <div class="gallery-item animals">

            <img src="images/img3.jpg" alt="Animal">

            <div class="overlay">
                <h3>Wild Lion</h3>
                <button class="view-btn">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    View
                </button>
            </div>

        </div>



        <!-- Image 4 -->

        <div class="gallery-item nature">

            <img src="images/img4.jpg" alt="Nature">

            <div class="overlay">
                <h3>Green Forest</h3>
                <button class="view-btn">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    View
                </button>
            </div>

        </div>



        <!-- Image 5 -->

        <div class="gallery-item city">

            <img src="images/img5.jpg" alt="City">

            <div class="overlay">
                <h3>Modern Buildings</h3>
                <button class="view-btn">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    View
                </button>
            </div>

        </div>



        <!-- Image 6 -->

        <div class="gallery-item animals">

            <img src="images/img6.jpg" alt="Animal">

            <div class="overlay">
                <h3>Beautiful Bird</h3>
                <button class="view-btn">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    View
                </button>
            </div>

        </div>

    </section>



    <!-- Lightbox -->

    <div class="lightbox">

        <span class="close">&times;</span>

        <img class="lightbox-img" src="" alt="">

        <div class="caption"></div>

        <div class="counter"></div>

        <button class="prev">
            <i class="fa-solid fa-chevron-left"></i>
        </button>

        <button class="next">
            <i class="fa-solid fa-chevron-right"></i>
        </button>

    </div>



    <!-- JavaScript -->
    <script src="script.js"></script>

</body>
</html>
